<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Demo 01 — Landing Page</title>
<!--
  DEMO 01: LANDING PAGE
  ─────────────────────
  Screens covered:
    A) Default — hero + two CTAs
    B) Join flow — input expands, validate
    C) Loading — after "Create Room" clicked

  Practice focus:
    - CSS Grid + Flexbox centering
    - Animated gradient background
    - Input focus/validation states
    - Button loading spinner
    - Smooth transitions between states
-->
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #03071a;
  --card:      #0d1117;
  --border:    #1f2937;
  --border-2:  #374151;
  --green:     #22c55e;
  --green-d:   #16a34a;
  --green-gl:  rgba(34,197,94,0.15);
  --sky:       #38bdf8;
  --text-1:    #f9fafb;
  --text-2:    #9ca3af;
  --text-3:    #6b7280;
  --text-4:    #374151;
}

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text-1);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Animated grid bg ───────────────────────────────────────── */
.bg-grid {
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(34,197,94,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(34,197,94,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black 40%, transparent 100%);
}

/* ── Glow orbs ──────────────────────────────────────────────── */
.glow-1 {
  position: fixed;
  width: 600px; height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(34,197,94,0.08) 0%, transparent 70%);
  top: -200px; left: 50%; transform: translateX(-50%);
  pointer-events: none; z-index: 0;
  animation: pulse 6s ease-in-out infinite;
}
.glow-2 {
  position: fixed;
  width: 400px; height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(56,189,248,0.06) 0%, transparent 70%);
  bottom: -100px; right: -100px;
  pointer-events: none; z-index: 0;
}
@keyframes pulse {
  0%,100% { transform: translateX(-50%) scale(1); opacity: 1; }
  50%      { transform: translateX(-50%) scale(1.1); opacity: 0.7; }
}

/* ── Main layout ────────────────────────────────────────────── */
.page {
  position: relative; z-index: 1;
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
  gap: 0;
}

/* ── Logo mark ──────────────────────────────────────────────── */
.logo-mark {
  width: 64px; height: 64px;
  border-radius: 18px;
  background: linear-gradient(135deg, #052e16, #0a3d1a);
  border: 1px solid rgba(34,197,94,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
  margin-bottom: 24px;
  box-shadow: 0 0 40px rgba(34,197,94,0.15);
  animation: floatMark 4s ease-in-out infinite;
}
@keyframes floatMark {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-6px); }
}

/* ── Hero text ──────────────────────────────────────────────── */
.hero-title {
  font-size: clamp(32px, 5vw, 52px);
  font-weight: 900;
  letter-spacing: 4px;
  color: var(--green);
  text-align: center;
  line-height: 1;
  margin-bottom: 16px;
  /* Gradient shimmer effect */
  background: linear-gradient(135deg, #22c55e 0%, #4ade80 50%, #22c55e 100%);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 4s linear infinite;
}
@keyframes shimmer {
  to { background-position: 200% center; }
}

.hero-sub {
  font-size: 16px;
  color: var(--text-2);
  text-align: center;
  line-height: 1.6;
  max-width: 420px;
  margin-bottom: 48px;
}
.hero-sub strong { color: var(--text-1); font-weight: 600; }

/* ── Card ───────────────────────────────────────────────────── */
.card {
  width: 100%; max-width: 420px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 32px;
  display: flex; flex-direction: column; gap: 12px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}

/* ── Primary CTA ────────────────────────────────────────────── */
.btn-create {
  width: 100%;
  height: 52px;
  background: var(--green);
  border: none; border-radius: 12px;
  color: #fff; font-size: 15px; font-weight: 700;
  cursor: pointer; font-family: inherit;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
  box-shadow: 0 4px 20px rgba(34,197,94,0.3);
  position: relative; overflow: hidden;
}
.btn-create::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.08) 50%, transparent 100%);
  transform: translateX(-100%);
  transition: transform 0.5s;
}
.btn-create:hover::after { transform: translateX(100%); }
.btn-create:hover { background: var(--green-d); box-shadow: 0 6px 28px rgba(34,197,94,0.4); }
.btn-create:active { transform: scale(0.98); }
.btn-create:disabled { background: var(--border-2); color: var(--text-3); box-shadow: none; cursor: default; }
.btn-create:disabled::after { display: none; }

/* Loading spinner */
.spinner {
  width: 18px; height: 18px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading .spinner { display: block; }
.loading .btn-icon { display: none; }

/* ── Divider ────────────────────────────────────────────────── */
.divider {
  display: flex; align-items: center; gap: 12px;
  color: var(--text-3); font-size: 12px;
}
.divider::before, .divider::after {
  content: ''; flex: 1;
  height: 1px; background: var(--border);
}

/* ── Join row ───────────────────────────────────────────────── */
.join-row {
  display: flex; gap: 8px;
}
.join-input {
  flex: 1;
  height: 48px;
  background: #0f172a;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0 14px;
  color: var(--text-1); font-size: 14px; font-family: inherit;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s, max-width 0.3s;
}
.join-input::placeholder { color: var(--text-3); }
.join-input:focus {
  border-color: var(--sky);
  box-shadow: 0 0 0 3px rgba(56,189,248,0.1);
}
.join-input.error {
  border-color: #f87171;
  box-shadow: 0 0 0 3px rgba(248,113,113,0.1);
  animation: shake 0.3s ease;
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25%      { transform: translateX(-6px); }
  75%      { transform: translateX(6px); }
}
.btn-join {
  height: 48px; padding: 0 18px;
  background: var(--sky-bg, #0c1a2e);
  border: 1px solid var(--sky);
  border-radius: 10px;
  color: var(--sky); font-size: 14px; font-weight: 600;
  cursor: pointer; font-family: inherit; white-space: nowrap;
  transition: background 0.2s;
}
.btn-join:hover { background: #112233; }

.join-hint {
  font-size: 12px; color: var(--text-3);
  text-align: center;
  height: 0; overflow: hidden;
  transition: height 0.3s, opacity 0.3s;
  opacity: 0;
}
.join-hint.visible { height: 18px; opacity: 1; }
.join-hint.error-hint { color: #f87171; }

/* ── Footer ─────────────────────────────────────────────────── */
.footer {
  position: relative; z-index: 1;
  padding: 20px;
  text-align: center;
  font-size: 12px; color: var(--text-4);
}

/* ── Features strip (bottom of card) ───────────────────────── */
.features {
  display: flex; gap: 4px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}
.feature {
  flex: 1;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 8px 4px;
  border-radius: 8px;
  background: rgba(255,255,255,0.02);
}
.feature-icon { font-size: 18px; }
.feature-label {
  font-size: 10px; color: var(--text-3);
  text-align: center; line-height: 1.3;
}

/* ── Loading overlay ────────────────────────────────────────── */
.loading-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 20px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
}
.loading-overlay.show { opacity: 1; pointer-events: all; }
.loading-ring {
  width: 56px; height: 56px;
  border: 3px solid rgba(34,197,94,0.2);
  border-top-color: var(--green);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.loading-text { color: var(--text-2); font-size: 15px; }
.loading-dots::after {
  content: '';
  animation: dots 1.2s steps(4, end) infinite;
}
@keyframes dots {
  0%   { content: ''; }
  25%  { content: '.'; }
  50%  { content: '..'; }
  75%  { content: '...'; }
}
</style>
</head>
<body>

<!-- Background -->
<div class="bg-grid"></div>
<div class="glow-1"></div>
<div class="glow-2"></div>

<!-- Loading overlay (shown after Create Room) -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-ring"></div>
  <div class="loading-text">Creating your room<span class="loading-dots"></span></div>
</div>

<!-- Main page -->
<main class="page">

  <!-- Logo -->
  <div class="logo-mark">🎵</div>

  <!-- Hero -->
  <h1 class="hero-title">LISTEN WITH US</h1>
  <p class="hero-sub">
    Watch <strong>YouTube videos</strong> together with friends —
    perfectly in sync, no matter where you are.
  </p>

  <!-- Card -->
  <div class="card">

    <!-- Create room -->
    <button class="btn-create" id="createBtn" onclick="createRoom()">
      <span class="btn-icon">✦</span>
      <span id="createLabel">Create a Room</span>
      <div class="spinner"></div>
    </button>

    <!-- Divider -->
    <div class="divider">or join existing</div>

    <!-- Join row -->
    <div class="join-row">
      <input
        class="join-input"
        id="joinInput"
        placeholder="Paste room link or code…"
        oninput="onJoinInput()"
        onkeydown="if(event.key==='Enter') joinRoom()"
      />
      <button class="btn-join" onclick="joinRoom()">Join →</button>
    </div>
    <div class="join-hint" id="joinHint">e.g. listenwithus.app/room/a3f9c2b1</div>

    <!-- Features -->
    <div class="features">
      <div class="feature">
        <span class="feature-icon">⚡</span>
        <span class="feature-label">Real-time sync</span>
      </div>
      <div class="feature">
        <span class="feature-icon">💬</span>
        <span class="feature-label">Live chat</span>
      </div>
      <div class="feature">
        <span class="feature-icon">🎭</span>
        <span class="feature-label">Reactions</span>
      </div>
      <div class="feature">
        <span class="feature-icon">👑</span>
        <span class="feature-label">Host control</span>
      </div>
    </div>

  </div>
</main>

<footer class="footer">Made for watching together · ListenWithUs</footer>

<script>
let creating = false;

function onJoinInput() {
  const v = document.getElementById('joinInput').value.trim();
  const hint = document.getElementById('joinHint');
  hint.classList.toggle('visible', v.length > 0);
  hint.classList.remove('error-hint');
  hint.textContent = 'e.g. listenwithus.app/room/a3f9c2b1';
  document.getElementById('joinInput').classList.remove('error');
}

function joinRoom() {
  const val = document.getElementById('joinInput').value.trim();
  const hint = document.getElementById('joinHint');
  if (!val) {
    document.getElementById('joinInput').classList.add('error');
    hint.classList.add('visible', 'error-hint');
    hint.textContent = 'Please enter a room code or link';
    return;
  }
  // Extract room ID from URL or use as-is
  const match = val.match(/room\/([a-zA-Z0-9]+)/);
  const roomId = match ? match[1] : val;
  showLoading('Joining room');
  setTimeout(() => {
    window.location.href = `room-preview.html`; // demo redirect
  }, 1800);
}

function createRoom() {
  if (creating) return;
  creating = true;
  showLoading('Creating your room');
  setTimeout(() => {
    window.location.href = `room-preview.html`; // demo redirect
  }, 2000);
}

function showLoading(msg) {
  const overlay = document.getElementById('loadingOverlay');
  overlay.querySelector('.loading-text').innerHTML = msg + '<span class="loading-dots"></span>';
  overlay.classList.add('show');
}
</script>
</body>
</html>
